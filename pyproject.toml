[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "lol-auto-director"
version = "1.2.0"
description = "Automatic camera director for two-player League of Legends broadcasts"
requires-python = ">=3.10"
dependencies = [
    "obsws-python>=1.7.0",
    "PySide6>=6.6.0",
    "requests>=2.31.0",
]

[project.scripts]
lol-auto-director = "main:main"

[tool.pytest.ini_options]
pythonpath = ["."]
