name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build director GUI executable
        run: pyinstaller build.spec --noconfirm

      - name: Build client agent executable
        run: pyinstaller build-client.spec --noconfirm

      - name: Verify executables
        run: |
          if (-Not (Test-Path "dist\LoLAutoDirector.exe")) { Write-Error "Director exe missing"; exit 1 }
          if (-Not (Test-Path "dist\LoLAutoDirectorClient.exe")) { Write-Error "Client exe missing"; exit 1 }
          Get-ChildItem dist\*.exe | Format-List Name, Length

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LoLAutoDirector.exe
            dist/LoLAutoDirectorClient.exe
          generate_release_notes: true
